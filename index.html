<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineTrack - Premium Movie Analytics</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script>
        // Configuração inicial do Tailwind Dark Mode por classe
        tailwind.config = {
            darkMode: 'class'
        }
    </script>
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        @keyframes shimmer {
            100% { transform: translateX(100%); }
        }
        .shimmer::after {
            position: absolute;
            top: 0; right: 0; bottom: 0; left: 0;
            transform: translateX(-100%);
            background-image: linear-gradient(90deg, rgba(255,255,255,0) 0%, rgba(255,255,255,0.05) 20%, rgba(255,255,255,0.1) 60%, rgba(255,255,255,0) 100%);
            animation: shimmer 1.5s infinite;
            content: '';
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 dark:bg-[#090d16] dark:text-slate-100 antialiased min-h-screen selection:bg-indigo-500 selection:text-white transition-colors duration-300">

    <nav class="border-b border-slate-200/60 dark:border-slate-800/60 bg-white/80 dark:bg-[#090d16]/80 backdrop-blur-md sticky top-0 z-40 transition-colors duration-300">
        <div class="max-w-7xl mx-auto px-6 h-20 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="bg-gradient-to-tr from-indigo-500 to-violet-600 p-2.5 rounded-xl text-white shadow-lg shadow-indigo-500/20">
                    <i data-lucide="clapperboard" class="w-5 h-5"></i>
                </div>
                <span class="font-extrabold text-xl tracking-tight text-slate-900 dark:text-white dark:bg-gradient-to-r dark:from-white dark:via-slate-200 dark:to-slate-400 dark:bg-clip-text dark:text-transparent">CineTrack, seja bem-vindo(a)!</span>
            </div>

            <div class="flex items-center gap-3">
                <div class="flex bg-slate-100 dark:bg-slate-900/80 p-1 rounded-xl border border-slate-200 dark:border-slate-800/50 transition-colors">
                    <button id="btn-trending" class="px-4 py-2 rounded-lg font-semibold text-xs tracking-wide transition-all bg-indigo-600 text-white shadow-md">POPULARES</button>
                    <button id="btn-favorites" class="px-4 py-2 rounded-lg font-semibold text-xs tracking-wide transition-all text-slate-500 dark:text-slate-400 hover:text-slate-900 dark:hover:text-white flex items-center gap-1.5">
                        FAVORITOS <span id="fav-count" class="bg-slate-200 dark:bg-slate-800 text-[10px] px-1.5 py-0.5 rounded-md font-bold text-slate-600 dark:text-slate-300">0</span>
                    </button>
                </div>

                <button id="theme-toggle" class="p-2.5 rounded-xl bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 text-slate-500 dark:text-slate-400 hover:bg-slate-50 dark:hover:bg-slate-800 transition-all shadow-sm" title="Alternar tema">
                    <i data-lucide="moon" id="theme-icon" class="w-4 h-4"></i>
                </button>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-6 py-12 space-y-12">
        
        <header class="flex flex-col md:flex-row md:items-center md:justify-between gap-6 bg-slate-100/50 dark:bg-gradient-to-b dark:from-slate-900/40 dark:to-transparent p-8 rounded-3xl border border-slate-200/60 dark:border-slate-800/30 transition-colors">
            <div class="space-y-1">
                <h1 id="section-title" class="text-3xl font-extrabold tracking-tight text-slate-900 dark:text-white">Filmes Populares</h1>
                <p class="text-slate-500 dark:text-slate-400 text-sm">Descubra, assista aos trailers e organize sua lista pessoal de cinema em tempo real.</p>
            </div>
            
            <div class="relative w-full md:w-80 group">
                <input id="search-movie" type="text" placeholder="Buscar filmes por título..." class="w-full pl-11 pr-4 py-3 bg-white dark:bg-slate-900/90 border border-slate-200 dark:border-slate-800 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500/30 focus:border-indigo-500 text-sm transition-all text-slate-900 dark:text-white placeholder:text-slate-400 dark:placeholder:text-slate-500 shadow-sm">
                <i data-lucide="search" class="w-4 h-4 text-slate-400 dark:text-slate-500 absolute left-4 top-3.5 group-focus-within:text-indigo-500 dark:group-focus-within:text-indigo-400 transition-colors"></i>
            </div>
        </header>

        <section id="movies-grid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-6">
            </section>

    </main>

    <div id="movie-modal" class="fixed inset-0 bg-slate-950/80 backdrop-blur-md z-50 flex items-center justify-center p-4 hidden opacity-0 transition-opacity duration-300">
        <div class="bg-white dark:bg-[#0f1626] border border-slate-200 dark:border-slate-800 w-full max-w-3xl rounded-3xl overflow-hidden shadow-2xl flex flex-col transform scale-95 transition-transform duration-300">
            
            <div class="relative aspect-video w-full bg-black border-b border-slate-200 dark:border-slate-800" id="video-container">
                </div>

            <div class="p-6 md:p-8 space-y-4 relative">
                <button id="close-modal" class="absolute top-6 right-6 p-2 rounded-xl bg-slate-100 dark:bg-slate-900/80 border border-slate-200 dark:border-slate-800 text-slate-500 dark:text-slate-400 hover:text-slate-900 dark:hover:text-white transition-colors">
                    <i data-lucide="x" class="w-5 h-5"></i>
                </button>
                
                <div class="flex items-center gap-3 flex-wrap">
                    <h2 id="modal-title" class="text-2xl font-extrabold text-slate-900 dark:text-white tracking-tight pr-10">Título do Filme</h2>
                    <span id="modal-rating" class="bg-slate-100 dark:bg-slate-900 px-2.5 py-1 rounded-lg text-xs font-bold text-amber-500 dark:text-amber-400 border border-slate-200 dark:border-slate-800 flex items-center gap-1">
                        <i data-lucide="star" class="w-3 h-3 fill-amber-500 dark:fill-amber-400 text-amber-500 dark:text-amber-400"></i> 0.0
                    </span>
                    <span id="modal-year" class="text-xs text-slate-500 dark:text-slate-400 font-medium">0000</span>
                </div>

                <div class="space-y-1">
                    <h4 class="text-xs font-bold text-slate-400 dark:text-slate-500 uppercase tracking-wider">Sinopse</h4>
                    <p id="modal-overview" class="text-sm text-slate-600 dark:text-slate-300 leading-relaxed max-h-32 overflow-y-auto pr-2">Descrição detalhada do enredo do filme.</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        // CONFIGURAÇÃO DA API (Substitua pelo seu Token real do TMDB)
        const TMDB_TOKEN = 'eyJhbGciOiJIUzI1NiJ9.eyJhdWQiOiJiNTRlOWU3MzNkYzczNDUyOGMzOTcyNDM5ODkwODVlMSIsIm5iZiI6MTc3OTAyNDg4Ni44MzMsInN1YiI6IjZhMDljM2Y2ZDkwNzY2MmM2MWY5ZThjZiIsInNjb3BlcyI6WyJhcGlfcmVhZCJdLCJ2ZXJzaW9uIjoxfQ.-f46PC_hkVvrRT0LcBMaPcqYHr-Ua_v--qeF75jQfkI';
        
        const themeToggleBtn = document.getElementById('theme-toggle');
        const themeIcon = document.getElementById('theme-icon');
        const moviesGrid = document.getElementById('movies-grid');
        const searchInput = document.getElementById('search-movie');
        const btnTrending = document.getElementById('btn-trending');
        const btnFavorites = document.getElementById('btn-favorites');
        const sectionTitle = document.getElementById('section-title');
        const favCountEl = document.getElementById('fav-count');

        // Elementos do Modal
        const movieModal = document.getElementById('movie-modal');
        const closeModalBtn = document.getElementById('close-modal');
        const videoContainer = document.getElementById('video-container');
        const modalTitle = document.getElementById('modal-title');
        const modalRating = document.getElementById('modal-rating');
        const modalYear = document.getElementById('modal-year');
        const modalOverview = document.getElementById('modal-overview');

        let favorites = JSON.parse(localStorage.getItem('cinetrack_favorites')) || [];
        let currentMode = 'trending';

        // LÓGICA DO TEMA (DARK MODE)
        if (localStorage.getItem('cinetrack_theme') === 'dark' || (!('cinetrack_theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
            themeIcon.setAttribute('data-lucide', 'sun');
        } else {
            document.documentElement.classList.remove('dark');
            themeIcon.setAttribute('data-lucide', 'moon');
        }

        themeToggleBtn.addEventListener('click', () => {
            if (document.documentElement.classList.contains('dark')) {
                document.documentElement.classList.remove('dark');
                localStorage.setItem('cinetrack_theme', 'light');
                themeIcon.setAttribute('data-lucide', 'moon');
            } else {
                document.documentElement.classList.add('dark');
                localStorage.setItem('cinetrack_theme', 'dark');
                themeIcon.setAttribute('data-lucide', 'sun');
            }
            lucide.createIcons();
        });

        function showSkeleton() {
            moviesGrid.innerHTML = '';
            for (let i = 0; i < 10; i++) {
                moviesGrid.innerHTML += `
                    <div class="space-y-3 animate-pulse">
                        <div class="aspect-[2/3] w-full bg-slate-200 dark:bg-slate-900 rounded-2xl relative overflow-hidden shimmer"></div>
                        <div class="h-4 bg-slate-300 dark:bg-slate-950 rounded-md w-3/4 relative overflow-hidden shimmer"></div>
                        <div class="h-3 bg-slate-300 dark:bg-slate-950 rounded-md w-1/2 relative overflow-hidden shimmer"></div>
                    </div>
                `;
            }
        }

        function updateFavCount() {
            favCountEl.innerText = favorites.length;
        }

        function renderMovies(movies) {
            moviesGrid.innerHTML = '';
            
            if (!movies || movies.length === 0) {
                moviesGrid.innerHTML = `<div class="col-span-full py-20 text-center text-slate-400 dark:text-slate-500 font-medium">Nenhum filme encontrado nesta categoria.</div>`;
                return;
            }

            movies.forEach(movie => {
                const posterUrl = movie.poster_path 
                    ? `https://image.tmdb.org/t/p/w500${movie.poster_path}`
                    : 'https://images.unsplash.com/photo-1594909122845-11baa439b7bf?q=80&w=500&auto=format&fit=crop';
                
                const rating = movie.vote_average ? movie.vote_average.toFixed(1) : 'N/A';
                const isFav = favorites.some(fav => fav.id === movie.id);
                const movieDataEscaped = btoa(unescape(encodeURIComponent(JSON.stringify(movie))));

                const card = document.createElement('div');
                card.className = "group relative bg-white dark:bg-slate-900/30 border border-slate-200 dark:border-slate-800/40 rounded-2xl p-3 hover:border-slate-300 dark:hover:border-slate-700/60 transition-all duration-300 hover:-translate-y-1 flex flex-col justify-between cursor-pointer shadow-sm dark:shadow-none";
                
                card.addEventListener('click', (e) => {
                    if (!e.target.closest('.btn-fav')) {
                        openModal(movie);
                    }
                });

                card.innerHTML = `
                    <div class="relative aspect-[2/3] w-full rounded-xl overflow-hidden mb-3 bg-slate-100 dark:bg-slate-900 shadow-md">
                        <img src="${posterUrl}" alt="${movie.title}" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500" loading="lazy">
                        
                        <div class="absolute top-2.5 left-2.5 bg-white/90 dark:bg-slate-950/80 backdrop-blur-md px-2 py-1 rounded-lg text-[11px] font-bold text-amber-600 dark:text-amber-400 border border-slate-200/20 dark:border-white/5 flex items-center gap-1">
                            <i data-lucide="star" class="w-3 h-3 fill-amber-500 dark:fill-amber-400 text-amber-500 dark:text-amber-400"></i> ${rating}
                        </div>

                        <button data-movie="${movieDataEscaped}" class="btn-fav absolute top-2.5 right-2.5 p-2 rounded-lg backdrop-blur-md border border-slate-200/20 dark:border-white/5 transition-all ${isFav ? 'bg-rose-500 text-white' : 'bg-white/90 dark:bg-slate-950/80 text-slate-500 dark:text-slate-400 hover:text-slate-900 dark:hover:text-white'}">
                            <i data-lucide="heart" class="w-3.5 h-3.5 ${isFav ? 'fill-white' : ''}"></i>
                        </button>
                    </div>
                    <div>
                        <h3 class="font-bold text-sm text-slate-800 dark:text-white line-clamp-1 group-hover:text-indigo-600 dark:group-hover:text-indigo-400 transition-colors">${movie.title}</h3>
                        <p class="text-xs text-slate-400 dark:text-slate-500 mt-0.5">${movie.release_date ? movie.release_date.split('-')[0] : 'S/D'}</p>
                    </div>
                `;
                moviesGrid.appendChild(card);
            });

            document.querySelectorAll('.btn-fav').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const decoded = JSON.parse(decodeURIComponent(escape(atob(btn.getAttribute('data-movie')))));
                    toggleFavorite(decoded);
                });
            });

            lucide.createIcons();
        }

        // COMUNICAÇÃO COM A API DO TMDB
        async function fetchFromTMDB(endpoint, params = '') {
            if (TMDB_TOKEN === 'COLE_AQUI_O_SEU_TOKEN_LONGO_DO_TMDB') {
                moviesGrid.innerHTML = `<div class="col-span-full py-20 text-center text-rose-500 dark:text-rose-400 font-semibold bg-rose-50 dark:bg-rose-950/10 border border-rose-200 dark:border-rose-900/30 rounded-2xl p-6">Por favor, insira o seu Token de Acesso do TMDB na linha 134 do código para carregar os dados!</div>`;
                return null;
            }

            try {
                const response = await fetch(`https://api.themoviedb.org/3/${endpoint}?language=pt-BR&region=BR${params}`, {
                    method: 'GET',
                    headers: {
                        accept: 'application/json',
                        Authorization: `Bearer ${TMDB_TOKEN}`
                    }
                });
                return await response.json();
            } catch (error) {
                console.error("Erro na requisição:", error);
                return null;
            }
        }

        async function loadTrending() {
            currentMode = 'trending';
            sectionTitle.innerText = "Filmes Populares";
            showSkeleton();
            const data = await fetchFromTMDB('movie/popular');
            if (data) renderMovies(data.results);
        }

        async function searchMovies(query) {
            currentMode = 'search';
            sectionTitle.innerText = `Resultados para: "${query}"`;
            showSkeleton();
            const data = await fetchFromTMDB('search/movie', `&query=${encodeURIComponent(query)}`);
            if (data) renderMovies(data.results);
        }

        function loadFavorites() {
            currentMode = 'favorites';
            sectionTitle.innerText = "Meus Favoritos";
            renderMovies(favorites);
        }

        // GERENCIAR JANELA DO MODAL (TRAILER)
        async function openModal(movie) {
            modalTitle.innerText = movie.title;
            modalRating.innerHTML = `<i data-lucide="star" class="w-3 h-3 fill-amber-500 dark:fill-amber-400 text-amber-500 dark:text-amber-400"></i> ${movie.vote_average ? movie.vote_average.toFixed(1) : 'N/A'}`;
            modalYear.innerText = movie.release_date ? movie.release_date.split('-')[0] : 'S/D';
            modalOverview.innerText = movie.overview || "Nenhuma sinopse disponível em português.";
            
            videoContainer.innerHTML = `<div class="w-full h-full flex items-center justify-center text-slate-400 dark:text-slate-500 text-xs font-medium"><span class="animate-pulse">Buscando trailer oficial...</span></div>`;
            
            movieModal.classList.remove('hidden');
            setTimeout(() => {
                movieModal.classList.remove('opacity-0');
                movieModal.firstElementChild.classList.remove('scale-95');
            }, 10);

            lucide.createIcons();

            const videoData = await fetchFromTMDB(`movie/${movie.id}/videos`);
            
            if (videoData && videoData.results.length > 0) {
                const trailer = videoData.results.find(v => v.type === 'Trailer' && v.site === 'YouTube') || videoData.results[0];
                
                if (trailer && trailer.key) {
                    videoContainer.innerHTML = `
                        <iframe class="w-full h-full" src="https://www.youtube.com/embed/${trailer.key}?autoplay=1" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" allowfullscreen></iframe>
                    `;
                    return;
                }
            }
            
            videoContainer.innerHTML = `
                <div class="w-full h-full flex flex-col items-center justify-center gap-2 text-slate-400 dark:text-slate-500 text-sm">
                    <i data-lucide="video-off" class="w-8 h-8 text-slate-300 dark:text-slate-600"></i>
                    <span>Nenhum vídeo promocional disponível para este título.</span>
                </div>
            `;
            lucide.createIcons();
        }

        function closeModal() {
            movieModal.classList.add('opacity-0');
            movieModal.firstElementChild.classList.add('scale-95');
            videoContainer.innerHTML = ''; 
            setTimeout(() => {
                movieModal.classList.add('hidden');
            }, 300);
        }

        closeModalBtn.addEventListener('click', closeModal);
        movieModal.addEventListener('click', (e) => {
            if (e.target === movieModal) closeModal();
        });

        // ADICIONAR / REMOVER FAVORITOS
        function toggleFavorite(movie) {
            const index = favorites.findIndex(fav => fav.id === movie.id);
            if (index > -1) {
                favorites.splice(index, 1);
            } else {
                favorites.unshift(movie);
            }
            localStorage.setItem('cinetrack_favorites', JSON.stringify(favorites));
            updateFavCount();
            
            if (currentMode === 'favorites') {
                loadFavorites();
            } else if (currentMode === 'trending' && searchInput.value === '') {
                loadTrending();
            } else if (searchInput.value !== '') {
                searchMovies(searchInput.value);
            }
        }

        // DEBOUNCE NA BARRA DE BUSCA
        let searchTimeout;
        searchInput.addEventListener('input', (e) => {
            clearTimeout(searchTimeout);
            const query = e.target.value.trim();
            
            if (query === '') {
                loadTrending();
                return;
            }

            searchTimeout = setTimeout(() => {
                searchMovies(query);
            }, 500);
        });

        // CONTROLE DE ABAS
        btnTrending.addEventListener('click', () => {
            searchInput.value = '';
            btnTrending.className = "px-5 py-2 rounded-lg font-semibold text-xs tracking-wide transition-all bg-indigo-600 text-white shadow-md";
            btnFavorites.className = "px-5 py-2 rounded-lg font-semibold text-xs tracking-wide transition-all text-slate-500 dark:text-slate-400 hover:text-slate-900 dark:hover:text-white flex items-center gap-1.5";
            loadTrending();
        });

        btnFavorites.addEventListener('click', () => {
            btnFavorites.className = "px-5 py-2 rounded-lg font-semibold text-xs tracking-wide transition-all bg-indigo-600 text-white shadow-md flex items-center gap-1.5";
            btnTrending.className = "px-5 py-2 rounded-lg font-semibold text-xs tracking-wide transition-all text-slate-500 dark:text-slate-400 hover:text-slate-900 dark:hover:text-white";
            loadFavorites();
        });

        // INICIALIZAR
        updateFavCount();
        loadTrending();
        lucide.createIcons();
    </script>
</body>
</html>
